name: Build & Release Native Dimmer Clients

on:
  workflow_dispatch:
  push:
    branches:
      - releaseBranch

jobs:
  build-and-release:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      # 1. CHECKOUT
      - name: Checkout Main Repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 

      # 2. CACHE NUGET
      - name: Cache NuGet Packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      # 3. DETECT VERSION (FORCED FULL RELEASE)
      - name: Detect Version
        id: version_logic
        shell: pwsh
        run: |
          $projectFile = Get-ChildItem -Recurse -Filter "Dimmer.csproj" | Select-Object -First 1
          [xml]$xml = Get-Content $projectFile.FullName
          $currentVersionStr = $xml.Project.PropertyGroup.Version.Trim()
          $newTag = "v$currentVersionStr"
          
          "NEW_TAG=$newTag" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          "IS_PRE=false" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          
          git fetch --tags --force
          $allTags = git tag --sort=-version:refname 
          $validPattern = "^v?\d+(\.\d+)+$"
          $foundTag = $allTags | Where-Object { $_.Trim() -ne $newTag -and $_.Trim() -match $validPattern } | Select-Object -First 1
          
          if ($null -ne $foundTag) {
              "LATEST_TAG=$($foundTag.Trim())" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          } else {
              "LATEST_TAG=" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          }

      # 3.5 GENERATE CHANGELOG (LIMITED TO LAST 10)
      - name: Generate Changelog
        shell: pwsh
        run: |
          $prevTag = $env:LATEST_TAG
          if ([string]::IsNullOrWhiteSpace($prevTag)) {
              $log = git log -n 10 --pretty=format:"- %s (%h)" --no-merges
          } else {
              $log = git log "$($prevTag)..HEAD" -n 10 --pretty=format:"- %s (%h)" --no-merges
          }
          
          $logString = if ($log -is [Array]) { $log -join "`n" } else { $log }
          
          if ([string]::IsNullOrWhiteSpace($logString)) { 
              $logString = git log -n 10 --pretty=format:"- %s (%h)" --no-merges -join "`n" 
          }
          
          $content = "## Changes in $env:NEW_TAG`n`n$logString"
          Set-Content -Path "release_notes.md" -Value $content -Encoding UTF8
          
          $eof = [System.Guid]::NewGuid().ToString("N")
          "ESCAPED_LOG<<$eof" | Out-File -FilePath $env:GITHUB_ENV -Append
          $logString | Out-File -FilePath $env:GITHUB_ENV -Append
          "$eof" | Out-File -FilePath $env:GITHUB_ENV -Append

      # 4. CHECKOUT DEPENDENCIES
      - name: Checkout Dependencies
        shell: pwsh
        run: |
          $depsRoot = "$env:GITHUB_WORKSPACE\ExternalDeps"
          New-Item -ItemType Directory -Force -Path $depsRoot
          
          git clone https://github.com/YBTopaz8/Last.fm "$depsRoot\Last.fm"
          git clone https://github.com/YBTopaz8/Parse-LiveQueries-DOTNET "$depsRoot\Parse-LiveQueries-DOTNET"
          git clone https://github.com/Zeugma440/atldotnet "$depsRoot\atldotnet-main"
          git clone https://github.com/xenolightning/AudioSwitcher "$depsRoot\AudioSwitcher-master"

      # 5. CREATE EXTERNALS.PROP
      - name: Create externals.props
        shell: pwsh
        run: |
          $propsContent = @'
          <Project>
            <PropertyGroup>
              <ExternalDepsPath>$(MSBuildThisFileDirectory)ExternalDeps\</ExternalDepsPath>
              <LastFmProjectPath>$(ExternalDepsPath)Last.fm\src\Hqub.Lastfm\Hqub.Lastfm.csproj</LastFmProjectPath>
              <ParseProjectPath>$(ExternalDepsPath)Parse-LiveQueries-DOTNET\ParseLiveQuery\ParseLiveQuery.csproj</ParseProjectPath>
              <AtlProjectPath>$(ExternalDepsPath)atldotnet-main\ATL\ATL.csproj</AtlProjectPath>
              <AudioSwitcherCorePath>$(ExternalDepsPath)AudioSwitcher-master\AudioSwitcher.AudioApi.CoreAudio\AudioSwitcher.AudioApi.CoreAudio.csproj</AudioSwitcherCorePath>
              <AudioSwitcherApiPath>$(ExternalDepsPath)AudioSwitcher-master\AudioSwitcher.AudioApi\AudioSwitcher.AudioApi.csproj</AudioSwitcherApiPath>
            </PropertyGroup>
          </Project>
          '@
          Set-Content -Path "externals.props" -Value $propsContent -Encoding UTF8
          Write-Host "Created externals.props"

      # 6. LOCATE PROJECT FILES - FIXED: Look for DimmerDroid.Droid.csproj
      - name: Locate Project Files
        shell: pwsh
        run: |
          $winui = Get-ChildItem -Recurse -Filter "Dimmer.WinUI.csproj" | Select-Object -First 1
          $droid = Get-ChildItem -Recurse -Filter "DimmerDroid.Droid.csproj" | Select-Object -First 1
          $core  = Get-ChildItem -Recurse -Filter "Dimmer.csproj" | Select-Object -First 1
          
          if (-not $droid) {
            Write-Error "DimmerDroid.Droid.csproj not found!"
            exit 1
          }
          
          echo "PATH_WINUI=$($winui.FullName)" >> $env:GITHUB_ENV
          echo "PATH_DROID=$($droid.FullName)" >> $env:GITHUB_ENV
          echo "DIR_CORE=$($core.Directory.FullName)" >> $env:GITHUB_ENV
          echo "DROID_DIR=$($droid.Directory.FullName)" >> $env:GITHUB_ENV
          
          Write-Host "Found Android project at: $($droid.FullName)"
          
      # 7. CREATE APPSETTINGS.JSON
      - name: Create appsettings.json
        shell: pwsh
        run: |
          $targetPath = Join-Path "${{ env.DIR_CORE }}" "appsettings.json"
          Set-Content -Path $targetPath -Value '${{ secrets.appsettings }}' -Encoding UTF8
          Write-Host "Created appsettings.json at $targetPath"

      # 8. FIX ALL CSPROJ FILES - COMPREHENSIVE FIX
      - name: Fix All Project Files
        shell: pwsh
        run: |
          # Function to fix project file
          function Fix-ProjectFile {
            param($csprojPath, $projectType)
            
            if (-not (Test-Path $csprojPath)) {
              Write-Host "Warning: $csprojPath not found"
              return $false
            }
            
            Write-Host "Fixing $projectType project: $csprojPath"
            $content = Get-Content $csprojPath -Raw
            
            # Fix import path to externals.props
            if ($content -match '<Import Project=".*externals\.props"') {
              $content = $content -replace '<Import Project="\.\.\\externals\.props"', '<Import Project="..\..\externals.props"'
              $content = $content -replace '<Import Project="\.\.\\\.\.\\externals\.props"', '<Import Project="..\..\externals.props"'
            } else {
              # Add import after Project tag
              $content = $content -replace '(<Project[^>]*>)', "`$1`n  <Import Project=`"..\..\externals.props`" Condition=`"Exists('..\..\externals.props')`" />"
            }
            
            # Replace hardcoded project references
            $content = $content -replace '<ProjectReference Include="\.\.\\\.\.\\\.\.\\Last\.fm\\src\\Hqub\.Lastfm\\Hqub\.Lastfm\.csproj" />', '<ProjectReference Include="$(LastFmProjectPath)" />'
            $content = $content -replace '<ProjectReference Include="\.\.\\\.\.\\\.\.\\Parse-LiveQueries-DOTNET\\ParseLiveQuery\\ParseLiveQuery\.csproj" />', '<ProjectReference Include="$(ParseProjectPath)" />'
            $content = $content -replace '<ProjectReference Include="\.\.\\\.\.\\atldotnet-main\\ATL\\ATL\.csproj" />', '<ProjectReference Include="$(AtlProjectPath)" />'
            
            # For WinUI specifically
            if ($projectType -eq "WinUI") {
              $content = $content -replace '<ProjectReference Include="\.\.\\\.\.\\AudioSwitcher-master\\AudioSwitcher\.AudioApi\.CoreAudio\\AudioSwitcher\.AudioApi\.CoreAudio\.csproj" />', '<ProjectReference Include="$(AudioSwitcherCorePath)" />'
              $content = $content -replace '<ProjectReference Include="\.\.\\\.\.\\AudioSwitcher-master\\AudioSwitcher\.AudioApi\\AudioSwitcher\.AudioApi\.csproj" />', '<ProjectReference Include="$(AudioSwitcherApiPath)" />'
            }
            
            Set-Content $csprojPath $content -Encoding UTF8
            Write-Host "Fixed $projectType project"
            return $true
          }
          
          # Fix all three projects
          $coreCsproj = Get-ChildItem -Recurse -Filter "Dimmer.csproj" | Select-Object -First 1
          $winuiCsproj = Get-ChildItem -Recurse -Filter "Dimmer.WinUI.csproj" | Select-Object -First 1
          $droidCsproj = Get-ChildItem -Recurse -Filter "DimmerDroid.Droid.csproj" | Select-Object -First 1
          
          if ($coreCsproj) { Fix-ProjectFile $coreCsproj.FullName "Core" }
          if ($winuiCsproj) { Fix-ProjectFile $winuiCsproj.FullName "WinUI" }
          if ($droidCsproj) { Fix-ProjectFile $droidCsproj.FullName "Android" }
          
          Write-Host "All project files fixed"

      # 9. DISABLE EXTERNAL REPO SIGNING
      - name: Disable AudioSwitcher Signing
        shell: pwsh
        run: |
          $audioPath = Join-Path $env:GITHUB_WORKSPACE "ExternalDeps\AudioSwitcher-master"
          Get-ChildItem -Path $audioPath -Recurse -Filter "*.csproj" | ForEach-Object {
            $content = Get-Content $_.FullName -Raw
            $content = $content -replace '<AssemblyOriginatorKeyFile>.*?</AssemblyOriginatorKeyFile>', ''
            $content = $content -replace '<SignAssembly>true</SignAssembly>', '<SignAssembly>false</SignAssembly>'
            Set-Content $_.FullName $content -Encoding UTF8
          }

      # 10. SETUP .NET & WORKLOADS
      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Install MAUI Workloads
        run: dotnet workload install maui-android maui-windows

      # 11. BUILD WINDOWS
      - name: Build Windows
        run: |
          dotnet publish "${{ env.PATH_WINUI }}" -f net10.0-windows10.0.19041.0 -c Release -r win-x64 -p:WindowsPackageType=None -p:GenerateAppxPackageOnBuild=false -p:AppxPackageSigningEnabled=false -o .\RawBuild\WinUI

      # 12. ZIP WINDOWS
      - name: Zip Windows Build
        shell: pwsh
        run: |
          $zipPath = ".\Artifacts\Dimmer-Windows-Portable-${{ env.NEW_TAG }}.zip"
          New-Item -ItemType Directory -Force -Path .\Artifacts
          Compress-Archive -Path .\RawBuild\WinUI\* -DestinationPath $zipPath
          echo "WIN_SIZE=$((Get-Item $zipPath).Length)" >> $env:GITHUB_ENV

      # 13. BUILD ANDROID
      - name: Build Android
        run: |
          dotnet publish "${{ env.PATH_DROID }}" -f net10.0-android -c Release -r android-arm64 -p:AndroidPackageFormat=apk -o .\RawBuild\Android
      
      - name: Get Android Size
        shell: pwsh
        run: |
          $apk = Get-ChildItem ".\RawBuild\Android\*-Signed.apk" | Select-Object -First 1
          if ($apk) {
            echo "APK_SIZE=$($apk.Length)" >> $env:GITHUB_ENV
          } else {
            echo "APK_SIZE=0" >> $env:GITHUB_ENV
          }

      # 14. UPLOAD ARTIFACTS
      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Dimmer-Builds-${{ env.NEW_TAG }}
          path: |
            RawBuild/Android/*.apk
            Artifacts/Dimmer-Windows-Portable-${{ env.NEW_TAG }}.zip
            
      # 15. PUSH TAG & CREATE RELEASE
      - name: Push Tag & Create Release
        id: create_release
        uses: softprops/action-gh-release@v1        
        with:
          tag_name: ${{ env.NEW_TAG }}
          name: Release ${{ env.NEW_TAG }}
          draft: false
          prerelease: false
          body_path: release_notes.md
          files: |
            RawBuild/Android/*.apk
            Artifacts/Dimmer-Windows-Portable-${{ env.NEW_TAG }}.zip

      # 16. NOTIFY PARSE SERVER
      - name: Notify Parse of New Update
        shell: pwsh
        env:
          PARSE_APP_ID: ${{ secrets.PARSE_APP_ID }}
          PARSE_MASTER_KEY: ${{ secrets.PARSE_MASTER_KEY }}
          PARSE_SERVER_URL: ${{ secrets.PARSE_SERVER_URL }}
        run: |
          $releaseUrl = "${{ github.server_url }}/${{ github.repository }}/releases/tag/$($env:NEW_TAG)"
          $aSize = "$([math]::Round($env:APK_SIZE / 1MB, 2)) MB"
          $wSize = "$([math]::Round($env:WIN_SIZE / 1MB, 2)) MB"
          
          $body = @{ 
              title        = "Dimmer $($env:NEW_TAG)"
              version      = "$($env:NEW_TAG)"
              notes        = "$($env:ESCAPED_LOG)"
              url          = $releaseUrl
              androidSize  = $aSize
              windowsSize  = $wSize
              isPreRelease = $false
          } | ConvertTo-Json
          
          $headers = @{ 
              "X-Parse-Application-Id" = $env:PARSE_APP_ID
              "X-Parse-Master-Key"     = $env:PARSE_MASTER_KEY
              "Content-Type"           = "application/json" 
          }
          
          Invoke-RestMethod -Uri "$($env:PARSE_SERVER_URL)/functions/postAppUpdate" -Method Post -Headers $headers -Body $body
      
      # 17. NOTIFY DISCORD
      - name: Notify Discord
        if: always()
        shell: pwsh
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: |
          if (-not $env:DISCORD_WEBHOOK) { exit 0 }
          $status = "${{ job.status }}"
          $color = if ($status -eq 'success') { 3066993 } else { 15158332 }
          $body = @{ embeds = @(@{ title = "Dimmer Release: ${{ env.NEW_TAG }}"; description = "Status: $status"; color = $color; fields = @(@{ name = "Release"; value = "[View](${{ github.server_url }}/${{ github.repository }}/releases/tag/${{ env.NEW_TAG }})" }) }) } | ConvertTo-Json -Depth 4
          Invoke-RestMethod -Uri $env:DISCORD_WEBHOOK -Method Post -ContentType 'application/json' -Body $body
